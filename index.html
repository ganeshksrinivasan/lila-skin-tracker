};

// ── API ───────────────────────────────────────────────────────────────────────
async function gasGet(params) {
  const qs = Object.entries(params)
    .map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
    .join("&");
  const res = await fetch(`${GAS_URL}?${qs}`);
  return res.json();
}

const api = {
  getSpots:    ()        => gasGet({ action:"get_spots" }),
  getCreamLog: (days=30) => gasGet({ action:"get_cream", days }),
  getAntiLog:  ()        => gasGet({ action:"get_anti" }),
  logCream:    p         => gasGet({ action:"log_cream", ...p }),
  logAnti:     dose      => gasGet({ action:"log_anti", dose_ml:dose }),
  addSpot:     p         => gasGet({ action:"add_spot", ...p }),
  updateSpot:  (id, act) => gasGet({ action:"update_spot", spot_id:id, active:act?"1":"0" }),
  deleteCream: (ts)      => gasGet({ action:"delete_cream", timestamp:ts }),
  deleteAnti:  (ts)      => gasGet({ action:"delete_anti",  timestamp:ts }),
  deleteSpot:  (id)      => gasGet({ action:"delete_spot",  spot_id:id }),
  renameSpot:  (id, name) => gasGet({ action:"rename_spot", spot_id:id, spot_name:name }),
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

function fmt(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = Math.floor((now - d) / 86400000);
  const time = d.toLocaleTimeString("en-SG", { hour:"2-digit", minute:"2-digit" });
  const date = diff === 0 ? "Today" : diff === 1 ? "Yesterday"
    : d.toLocaleDateString("en-SG", { day:"numeric", month:"short" });
  return { date, time };
}

function spotLogs(logs, id) {
  return logs.filter(l => l.spot_id === id)
    .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
}

function lastCream(logs, id) {
  return spotLogs(logs, id)[0]?.cream_colour || null;
}

function consecutiveDays(logs, id) {
  const sl = spotLogs(logs, id);
  if (!sl.length) return 0;
  let n = 0;
  for (let i = 0; i < 30; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const ds = d.toDateString();
    if (sl.some(l => new Date(l.timestamp).toDateString() === ds)) n++;
    else break;
  }
  return n;
}

function weekGrid(logs, id) {
  const sl = spotLogs(logs, id);
  const now = new Date();
  const dow = now.getDay();
  const toMon = (dow + 6) % 7;
  const mon = new Date(now);
  mon.setDate(mon.getDate() - toMon);
  mon.setHours(0,0,0,0);

  return Array.from({ length:4 }, (_,w) =>
    Array.from({ length:7 }, (_,d) => {
      const day = new Date(mon);
      day.setDate(day.getDate() - (3-w)*7 + d);
      const ds = day.toDateString();
      const dl = sl.filter(l => new Date(l.timestamp).toDateString() === ds);
      return dl.length ? dl.map(l => l.cream_colour) : null;
    })
  );
}

function weekLabels() {
  const now = new Date();
  const toMon = (now.getDay() + 6) % 7;
  const mon = new Date(now);
  mon.setDate(mon.getDate() - toMon);
  return Array.from({ length:4 }, (_,w) => {
    const d = new Date(mon);
    d.setDate(d.getDate() - (3-w)*7);
    return d.toLocaleDateString("en-SG", { day:"numeric", month:"short" });
  });
}

const isActive = s => s.active === "1" || s.active === true || s.active === 1;

// ── ADD SPOT MODAL ────────────────────────────────────────────────────────────
function AddSpotModal({ onConfirm, onCancel }) {
  const [name, setName] = useState("");
  const ref = useRef(null);
  useEffect(() => { setTimeout(()=>ref.current?.focus(), 150); }, []);
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(30,15,10,0.5)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}} onClick={onCancel}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#FDFAF7",borderRadius:20,padding:24,width:"100%",maxWidth:360,boxShadow:"0 8px 40px rgba(0,0,0,0.22)"}}>
        <div style={{fontSize:16,fontWeight:700,color:"#1E0F0A",marginBottom:5}}>Name this spot</div>
        <div style={{fontSize:12,color:"#9B8B7E",marginBottom:16}}>e.g. "Right inner elbow", "Left cheek"</div>
        <input
          ref={ref}
          value={name}
          onChange={e=>setName(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&name.trim())onConfirm(name.trim());}}
          placeholder="Spot name..."
          style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1.5px solid #EDE7E0",fontSize:15,outline:"none",background:"#FDFAF7",marginBottom:14,color:"#1E0F0A"}}
        />
        <div style={{display:"flex",gap:10}}>
          <button onClick={onCancel} style={{flex:1,padding:"12px",borderRadius:12,border:"none",background:"#F0EBE5",color:"#7A6A60",fontWeight:600,fontSize:14,cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>{if(name.trim())onConfirm(name.trim());}} style={{flex:2,padding:"12px",borderRadius:12,border:"none",background:name.trim()?"#1E0F0A":"#D4C4B8",color:name.trim()?"#fff":"#9B8B7E",fontWeight:700,fontSize:14,cursor:name.trim()?"pointer":"default",transition:"all 0.15s"}}>Add Spot</button>
        </div>
      </div>
    </div>
  );
}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
          {Object.entries(CREAMS).map(([id,c]) => (
            <button key={id} onClick={()=>setSel(id)} style={{padding:"16px 12px",borderRadius:14,border:`2.5px solid ${sel===id?c.color:"#EDE7E0"}`,background:sel===id?c.color+"18":"#F8F4F0",cursor:"pointer",display:"flex",alignItems:"center",gap:10,transition:"all 0.15s"}}>
              <div style={{width:20,height:20,borderRadius:6,background:c.color,flexShrink:0}}/>
              <span style={{fontSize:15,fontWeight:600,color:sel===id?"#1E0F0A":"#7A6A60"}}>{c.label}</span>
            </button>
          ))}
        </div>
        <button onClick={()=>{if(sel)onConfirm(sel);}} style={{width:"100%",padding:"14px",borderRadius:14,border:"none",background:sel?"#1E0F0A":"#EDE7E0",color:sel?"#fff":"#B4A49A",fontWeight:700,fontSize:15,cursor:sel?"pointer":"default",transition:"all 0.15s"}}>
          {sel?`Log ${CREAMS[sel].label} Cream`:"Select a cream above"}
        </button>
      </div>
    </div>
  );
}

// ── EDITABLE NAME ────────────────────────────────────────────────────────────
function EditableName({ name, onSave }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(name);
  const ref = useRef(null);
  useEffect(()=>{ if(editing) setTimeout(()=>ref.current?.focus(),100); },[editing]);
  const save = () => {
    if(val.trim() && val.trim()!==name) onSave(val.trim());
    setEditing(false);
  };
  if(editing) return (
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <input ref={ref} value={val} onChange={e=>setVal(e.target.value)}
        onKeyDown={e=>{if(e.key==="Enter")save();if(e.key==="Escape")setEditing(false);}}
        style={{flex:1,fontSize:17,fontWeight:700,color:"#1E0F0A",border:"none",borderBottom:"2px solid #C1121F",background:"transparent",outline:"none",padding:"2px 0"}}/>
      <button onClick={save} style={{background:"#1E0F0A",color:"#fff",border:"none",borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Save</button>
      <button onClick={()=>setEditing(false)} style={{background:"#F0EBE5",color:"#7A6A60",border:"none",borderRadius:8,padding:"4px 10px",fontSize:12,cursor:"pointer"}}>✕</button>
    </div>
  );
  return (
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <div style={{fontWeight:700,fontSize:18,color:"#1E0F0A",letterSpacing:"-0.3px"}}>{name}</div>
      <button onClick={()=>{setVal(name);setEditing(true);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#B4A49A",padding:"2px 4px"}} title="Rename">✏️</button>
    </div>
  );
}

  );
}

// ── ANTIHISTAMINE TAB ─────────────────────────────────────────────────────────
function AntihistamineTab({ antiLog, onLog }) {
  const [dose, setDose] = useState(null);
  const [logging, setLogging] = useState(false);
  const now = new Date().toLocaleTimeString("en-SG",{hour:"2-digit",minute:"2-digit"});
  const sorted = [...antiLog].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  const last = sorted[0];
  const hrsSince = last ? (Date.now()-new Date(last.timestamp))/3600000 : null;
  const tooSoon = hrsSince!==null && hrsSince<6;

  const doLog = async () => {
    if (!dose||logging||tooSoon) return;
    setLogging(true);
    await onLog(dose);
    setDose(null);
    setLogging(false);
  };

  return (
    <div style={{flex:1,overflowY:"auto",padding:"16px 20px 0"}}>
      <div style={{background:"#fff",borderRadius:16,padding:"18px",marginBottom:18,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:"#1E0F0A"}}>Cetirizine</div>
            <div style={{fontSize:12,color:"#9B8B7E",marginTop:3}}>
              {last?`Last: ${fmt(last.timestamp).date} ${fmt(last.timestamp).time}`:"No doses logged yet"}
            </div>
          </div>
          <div style={{background:tooSoon?"#FFF0F0":"#E8F8F6",borderRadius:8,padding:"4px 10px"}}>
            <span style={{fontSize:11,fontWeight:700,color:tooSoon?"#C1121F":"#2A9D8F"}}>
              {tooSoon?`⚠ ${hrsSince.toFixed(1)}h ago`:"✓ Clear"}
            </span>
          </div>
        </div>
        {tooSoon && <div style={{marginTop:10,background:"#FFF0F0",border:"1px solid #FFCDD2",borderRadius:10,padding:"9px 14px",fontSize:12,color:"#C1121F"}}>Last dose was {hrsSince.toFixed(1)}h ago — minimum 6h between doses</div>}
        <div style={{height:1,background:"#F0EBE5",margin:"14px 0"}}/>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"#9B8B7E",marginBottom:10}}>Select Dose</div>
        <div style={{display:"flex",gap:10,marginBottom:14}}>
          {["2.5ml","5ml"].map(d=>(
            <button key={d} onClick={()=>setDose(d)} style={{flex:1,padding:"15px",borderRadius:12,border:`2px solid ${dose===d?"#1E0F0A":"#EDE7E0"}`,background:dose===d?"#1E0F0A":"#FDFAF7",color:dose===d?"#fff":"#1E0F0A",fontWeight:700,fontSize:20,cursor:"pointer",transition:"all 0.15s"}}>{d}</button>
          ))}
        </div>
        <button onClick={doLog} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:dose&&!tooSoon?"#C1121F":"#EDE7E0",color:dose&&!tooSoon?"#fff":"#B4A49A",fontWeight:700,fontSize:14,cursor:dose&&!tooSoon?"pointer":"default",transition:"all 0.15s",opacity:logging?0.6:1}}>
          {logging?"Logging...":dose&&!tooSoon?`Log ${dose} · ${now}`:"Select a dose above"}
        </button>
      </div>

      <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"#9B8B7E",marginBottom:10}}>History</div>
      <div style={{background:"#fff",borderRadius:16,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,0.06)",marginBottom:32}}>
        {sorted.length===0 && <div style={{padding:"18px",fontSize:13,color:"#B4A49A",fontStyle:"italic"}}>No doses logged yet</div>}
        {sorted.map((e,i)=>{
          const {date,time}=fmt(e.timestamp);
          return (
            <div key={i} style={{display:"flex",alignItems:"center",padding:"12px 18px",borderBottom:i<sorted.length-1?"1px solid #F5F0EA":"none",gap:12}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#9B8B7E",flexShrink:0}}/>
              <div style={{flex:1,fontSize:13,color:"#1E0F0A"}}>{date}</div>
              <div style={{fontSize:12,color:"#9B8B7E"}}>{time}</div>
              <div style={{fontSize:13,fontWeight:700,color:"#1E0F0A"}}>{e.dose_ml}</div>
              <button onClick={async()=>{setAntiLog(p=>p.filter(l=>l.timestamp!==e.timestamp));try{await api.deleteAnti(e.timestamp);}catch(ex){}}} style={{marginLeft:4,background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#C8B8B0",padding:"0 2px"}} title="Delete">🗑</button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [viewIdx,setViewIdx]         = useState(0);
  const [tab,setTab]                 = useState("body");
  const [spots,setSpots]             = useState([]);
  const [creamLog,setCreamLog]       = useState([]);
  const [antiLog,setAntiLog]         = useState([]);
  const [loading,setLoading]         = useState(true);
  const [error,setError]             = useState(null);
  const [selectedSpot,setSelectedSpot] = useState(null);
  const [pendingCoords,setPendingCoords] = useState(null);
  const [showCreamModal,setShowCreamModal] = useState(false);
  const touchStartX = useRef(null);
  const svgRef = useRef(null);
  const view = VIEWS[viewIdx];

  useEffect(()=>{
    (async()=>{
      try {
        const [s,c,a] = await Promise.all([api.getSpots(),api.getCreamLog(30),api.getAntiLog()]);
        setSpots(s.rows||[]);
        setCreamLog(c.rows||[]);
        setAntiLog(a.rows||[]);
      } catch(e){ setError("Cannot connect. Check your internet connection."); }
      finally { setLoading(false); }
    })();
  },[]);

  const enriched = spots.map(s=>{
    const id = s.id || s.spot_id;
    return {
      ...s,
      id,
      x: parseFloat(s.x), y: parseFloat(s.y),
      lastCream: lastCream(creamLog, id),
      consecutive: consecutiveDays(creamLog, id),
    };
  });

  const handleBodyClick = useCallback((x,y)=>{
    const viewSpots = enriched.filter(s=>s.view===view);
    const near = viewSpots.find(s=>Math.hypot(s.x-x,s.y-y)<8);
    if (near) setSelectedSpot(near);
    else setPendingCoords({x,y});
  },[enriched,view]);

  const handleAddSpot = async(name)=>{
    const ns={ id:genId(), view, name, spot_name:name, x:Math.round(pendingCoords.x*10)/10, y:Math.round(pendingCoords.y*10)/10, active:"1" };
    setPendingCoords(null);
    setSpots(p=>[...p,ns]);
    try { await api.addSpot({ spot_id:ns.id, view:ns.view, spot_name:name, x:ns.x, y:ns.y }); } catch(e){}
  };

  const handleLogCream = async(colour)=>{
    setShowCreamModal(false);
    const spot=selectedSpot;
    const entry={ spot_id:spot.id, spot_name:spot.name||spot.spot_name, view:spot.view, cream_colour:colour, x:spot.x, y:spot.y, timestamp:new Date().toISOString() };
    setCreamLog(p=>[entry,...p]);
    setSelectedSpot(null);
    try { await api.logCream({ spot_id:spot.id, spot_name:spot.name||spot.spot_name, view:spot.view, cream_colour:colour, x:spot.x, y:spot.y }); } catch(e){}
  };

  const handleToggleActive = async()=>{
    const spot=selectedSpot;
    const newAct=isActive(spot)?"0":"1";
    setSpots(p=>p.map(s=>s.id===spot.id?{...s,active:newAct}:s));
    setSelectedSpot(null);
    try { await api.updateSpot(spot.id,newAct==="1"); } catch(e){}
  };

  const handleDeleteEntry = async(timestamp)=>{
    setCreamLog(p=>p.filter(l=>l.timestamp!==timestamp));
    try { await api.deleteCream(timestamp); } catch(e){}
  };

  const handleDeleteSpot = async()=>{
    const spot=selectedSpot;
    if(!window.confirm(`Delete "${spot.name||spot.spot_name}" and all its logs?`)) return;
    setSpots(p=>p.filter(s=>s.id!==spot.id));
    setCreamLog(p=>p.filter(l=>l.spot_id!==spot.id));
    setSelectedSpot(null);
    try { await api.deleteSpot(spot.id); } catch(e){}
  };

  const handleRename = async(name)=>{
    const spot=selectedSpot;
    setSpots(p=>p.map(s=>s.id===spot.id?{...s,name,spot_name:name}:s));
    setSelectedSpot(s=>s?{...s,name,spot_name:name}:s);
    try { await api.renameSpot(spot.id,name); } catch(e){}
  };

  const handleLogAnti = async(dose)=>{
    const entry={ dose_ml:dose, timestamp:new Date().toISOString() };
    setAntiLog(p=>[entry,...p]);
    try { await api.logAnti(dose); } catch(e){}
  };

  const handleTouchStart=e=>{touchStartX.current=e.touches[0].clientX;};
  const handleTouchEnd=e=>{
    if(touchStartX.current===null)return;
    const dx=e.changedTouches[0].clientX-touchStartX.current;
    if(Math.abs(dx)>50)setViewIdx(i=>dx<0?(i+1)%4:(i+3)%4);
    touchStartX.current=null;
  };

  const sideLabels={FRONT:["R","L"],BACK:["L","R"],RIGHT:["F","B"],LEFT:["B","F"]};
  const [lLabel,rLabel]=sideLabels[view];
  const viewChips=enriched.filter(s=>s.view===view);
  const selEnriched=selectedSpot?enriched.find(s=>s.id===selectedSpot.id)||selectedSpot:null;

  if(loading) return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,background:"#F5EFE8"}}>
      <div style={{fontSize:32}}>🌿</div>
      <div style={{fontSize:14,color:"#9B8B7E"}}>Loading Lila's tracker…</div>
    </div>
  );
  if(error) return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,padding:28,background:"#F5EFE8",textAlign:"center"}}>
      <div style={{fontSize:28}}>⚠️</div>
      <div style={{fontSize:14,color:"#C1121F"}}>{error}</div>
    </div>
  );

  return(
    <div style={{height:"100%",maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column",background:"#F5EFE8",position:"relative",overflow:"hidden"}}>

      {/* Header */}
      <div style={{background:"#fff",padding:"16px 20px 12px",borderBottom:"1px solid #EDE7E0",flexShrink:0}}>
        <div style={{fontSize:10,color:"#B4A49A",letterSpacing:2,textTransform:"uppercase",marginBottom:2}}>Skin Log</div>
        <div style={{fontSize:20,fontWeight:700,color:"#1E0F0A",letterSpacing:"-0.5px"}}>Lila's Tracker</div>
      </div>

      {tab==="body"?(
        <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0,overflow:"hidden"}}
          onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
          {/* View dots */}
          <div style={{padding:"10px 0 2px",textAlign:"center",flexShrink:0}}>
            <div style={{display:"flex",justifyContent:"center",gap:5,marginBottom:7}}>
              {VIEWS.map((v,i)=>(
                <div key={v} onClick={()=>setViewIdx(i)} style={{height:5,borderRadius:3,cursor:"pointer",width:i===viewIdx?22:5,background:i===viewIdx?"#C1121F":"#D4C4B8",transition:"width 0.25s"}}/>
              ))}
            </div>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:2.5,color:"#7A6A60",textTransform:"uppercase"}}>{view}</div>
            <div style={{fontSize:10,color:"#C4B0A4",marginTop:1}}>swipe to rotate · tap body to add spot</div>
          </div>

          {/* Body */}
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 6px",minHeight:0}}>
            <div style={{fontSize:12,fontWeight:800,color:"#C1121F",width:20,textAlign:"center"}}>{lLabel}</div>
            <div style={{flex:1,maxWidth:150,aspectRatio:"100/210"}}>
              <BodySVG view={view} spots={enriched} onSpotClick={s=>setSelectedSpot(s)} onBodyClick={handleBodyClick} svgRef={svgRef}/>
            </div>
            <div style={{fontSize:12,fontWeight:800,color:"#C1121F",width:20,textAlign:"center"}}>{rLabel}</div>
          </div>

          {/* Chips */}
          <div style={{padding:"5px 16px 12px",display:"flex",gap:7,flexWrap:"wrap",flexShrink:0}}>
            {viewChips.length===0&&<div style={{fontSize:12,color:"#B4A49A",fontStyle:"italic",padding:"4px 2px"}}>No spots — tap body to add</div>}
            {viewChips.filter(s=>isActive(s)).map(s=>(
              <div key={s.id} onClick={()=>setSelectedSpot(s)} style={{display:"flex",alignItems:"center",gap:6,background:"#fff",borderRadius:20,padding:"6px 12px",boxShadow:"0 1px 5px rgba(0,0,0,0.08)",cursor:"pointer",border:s.consecutive>=7?"1.5px solid #C1121F":"1.5px solid transparent"}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:s.lastCream?CREAMS[s.lastCream]?.color:"#9B8B7E"}}/>
                <span style={{fontSize:12,fontWeight:600,color:"#1E0F0A"}}>{s.name||s.spot_name}</span>
                {s.consecutive>=7&&<span style={{fontSize:10,color:"#C1121F"}}>⚠</span>}
              </div>
            ))}
            {viewChips.filter(s=>!isActive(s)).map(s=>(
              <div key={s.id} onClick={()=>setSelectedSpot(s)} style={{display:"flex",alignItems:"center",gap:6,background:"#EDE7E0",borderRadius:20,padding:"6px 12px",cursor:"pointer",opacity:0.65}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:"#B4A49A"}}/>
                <span style={{fontSize:12,color:"#7A6A60"}}>{s.name||s.spot_name}</span>
                <span style={{fontSize:10,color:"#9B8B7E"}}>inactive</span>
              </div>
            ))}
          </div>
        </div>
      ):(
        <AntihistamineTab antiLog={antiLog} onLog={handleLogAnti}/>
      )}

      {/* Tab bar */}
      <div style={{background:"#fff",borderTop:"1px solid #EDE7E0",display:"flex",paddingBottom:8,flexShrink:0}}>
        {[{id:"body",label:"Body Map",icon:"🧍"},{id:"anti",label:"Antihistamine",icon:"💊"}].map(t=>(
          <div key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"8px 0 4px",textAlign:"center",cursor:"pointer",borderTop:`2.5px solid ${tab===t.id?"#C1121F":"transparent"}`}}>
            <div style={{fontSize:20}}>{t.icon}</div>
            <div style={{fontSize:11,marginTop:2,fontWeight:tab===t.id?700:400,color:tab===t.id?"#C1121F":"#9B8B7E"}}>{t.label}</div>
          </div>
        ))}
      </div>

      {/* Modals */}
      {pendingCoords&&<AddSpotModal onConfirm={handleAddSpot} onCancel={()=>setPendingCoords(null)}/>}
      {selEnriched&&!showCreamModal&&<SpotPanel spot={selEnriched} logs={creamLog} onClose={()=>setSelectedSpot(null)} onLog={()=>setShowCreamModal(true)} onToggleActive={handleToggleActive} onDeleteEntry={handleDeleteEntry} onDeleteSpot={handleDeleteSpot} onRename={handleRename}/>}
      {selEnriched&&showCreamModal&&<CreamModal spot={selEnriched} onConfirm={handleLogCream} onCancel={()=>setShowCreamModal(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
