<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Lila's Skin Tracker v4</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'DM Sans',sans-serif;background:#F5EFE8;overflow:hidden;height:100%}
    .zoom-btn{position:absolute;bottom:20px;right:20px;background:#1E0F0A;color:#fff;border:none;padding:12px 20px;border-radius:30px;font-weight:700;box-shadow:0 4px 15px rgba(0,0,0,0.2);z-index:100}
    .region-label{position:absolute;top:80px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.8);padding:4px 12px;border-radius:12px;font-size:12px;font-weight:700;color:#7A6A60;pointer-events:none}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const GAS_URL = "https://script.google.com/macros/s/AKfycbyiu3OjV6tSlKnVouU_EJIHbPvC29kjLnjlhyNFohaqHWZgiW8dAQ9ZAP2rzNCc9Fte/exec";

// REGION DEFINITIONS (x, y, width, height)
const REGIONS = {
  HEAD:  { x: 30, y: 0,   w: 40, h: 45,  label: "Head & Neck" },
  TORSO: { x: 15, y: 35,  w: 70, h: 80,  label: "Torso" },
  ARMS:  { x: 0,  y: 35,  w: 100,h: 90,  label: "Arms & Hands" },
  LEGS:  { x: 20, y: 100, w: 60, h: 110, label: "Legs & Feet" }
};

const SPOT_TYPES = {
  FLARE: { color: "#C1121F", label: "Active Flare" },
  SCAR:  { color: "#8B7E74", label: "Scar / Mark" },
  DRY:   { color: "#D4900A", label: "Dry Patch" }
};

// --- API & HELPERS (Kept from your original) ---
const api = {
  getSpots: () => fetch(`${GAS_URL}?action=get_spots`).then(r => r.json()),
  addSpot: (p) => fetch(`${GAS_URL}?action=add_spot&${new URLSearchParams(p)}`).then(r => r.json()),
  // ... other API methods remain the same
};

function BodySVG({ view, spots, selectedRegion, onSpotClick, onBodyClick, onRegionSelect }) {
  const svgRef = useRef(null);
  
  // Dynamic Viewbox based on Zoom
  const vb = selectedRegion ? `${REGIONS[selectedRegion].x} ${REGIONS[selectedRegion].y} ${REGIONS[selectedRegion].w} ${REGIONS[selectedRegion].h}` : "0 0 100 210";

  const handleSVGClick = (e) => {
    const svg = svgRef.current;
    const pt = svg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    const cursorPT = pt.matrixTransform(svg.getScreenCTM().inverse());
    
    // If not zoomed, check if we should zoom into a region
    if (!selectedRegion) {
      if (cursorPT.y < 40) return onRegionSelect('HEAD');
      if (cursorPT.y > 110) return onRegionSelect('LEGS');
      return onRegionSelect('TORSO');
    }
    
    onBodyClick(cursorPT.x, cursorPT.y);
  };

  return (
    <div style={{ position: 'relative', width: '100%', height: '100%' }}>
      {selectedRegion && <div className="region-label">{REGIONS[selectedRegion].label}</div>}
      <svg ref={svgRef} viewBox={vb} onClick={handleSVGClick} style={{ width: '100%', height: '100%', transition: 'all 0.4s ease-in-out' }}>
        {/* Your original Body Paths go here (simplified for proto) */}
        <g fill="#EDD5C0" stroke="#A06840" strokeWidth="0.8">
          <ellipse cx="50" cy="16" rx="12" ry="14" /> {/* Head */}
          <path d="M35,106 L65,106 C72,105 79,102 79,97 C84,68 84,38 54,38 Z" /> {/* Body */}
          {/* ... Add your full path set here ... */}
        </g>

        {/* SPOTS with Larger Hit Areas */}
        {spots.filter(s => s.view === view).map(s => (
          <g key={s.id} onClick={(e) => { e.stopPropagation(); onSpotClick(s); }}>
            <circle cx={s.x} cy={s.y} r={selectedRegion ? 4 : 8} fill="transparent" /> {/* Hit Area */}
            <circle cx={s.x} cy={s.y} r={selectedRegion ? 2.5 : 4} fill={SPOT_TYPES[s.type || 'FLARE'].color} />
          </g>
        ))}
      </svg>
    </div>
  );
}

function App() {
  const [region, setRegion] = useState(null);
  const [spots, setSpots] = useState([]);
  const [view, setView] = useState("FRONT");

  // Add your existing useEffect for loading here...

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column' }}>
      <header style={{ padding: 20, background: '#fff' }}>
        <h3>Lila's Tracker</h3>
        <p style={{ fontSize: 12, color: '#999' }}>{region ? "Tap to add spot" : "Select region to zoom"}</p>
      </header>

      <div style={{ flex: 1, position: 'relative' }}>
        <BodySVG 
          view={view} 
          spots={spots} 
          selectedRegion={region} 
          onRegionSelect={setRegion}
          onSpotClick={(s) => console.log("Spot:", s)}
          onBodyClick={(x,y) => console.log("New Spot at:", x, y)}
        />
        
        {region && (
          <button className="zoom-btn" onClick={() => setRegion(null)}>
            ← Zoom Out
          </button>
        )}
      </div>
      
      {/* Navigation Tabs */}
      <footer style={{ height: 60, background: '#fff', display: 'flex' }}>
         {/* Your original tab logic here */}
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
